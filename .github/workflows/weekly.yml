name: Daily Pregnancy Reminder

on:
  schedule:
    - cron: "0 12 * * *"

  workflow_dispatch:

jobs:
  reminder:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run reminder
        run: python reminder.py
